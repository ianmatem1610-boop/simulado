<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrakeBank | Simulador de Crédito Pro</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

    <div class="container">
        <div class="header-banner">
            <img src="imagen.jpg" alt="Atención al cliente KrakeBank" class="banner-img">
            <div class="banner-overlay">
                <h1 class="logo-text">KRAKE<span>BANK</span></h1>
                <p class="tagline">Banca Digital a tu medida</p>
            </div>
        </div>

        <div class="form-content">
            <h2>Datos financieros</h2>
            <label for="txtIngresos">Ingresos Mensuales:</label>
            <input type="text" id="txtIngresos" placeholder="Ej: 1200.00">

            <label for="txtEgresos">Egresos Mensuales:</label>
            <input type="text" id="txtEgresos" placeholder="Ej: 400.00">

            <div class="result-box">
                <p>Disponible: <span id="spnDisponible"></span></p>
                <p>Capacidad de pago: <span id="spnCapacidadPago"></span></p>
            </div>

            <h2>Solicitud de crédito</h2>
            <label for="txtMonto">Monto Solicitado:</label>
            <input type="text" id="txtMonto" placeholder="Monto del préstamo">

            <label for="txtPlazo">Plazo (Años):</label>
            <input type="text" id="txtPlazo" placeholder="Ej: 2">

            <label for="txtTasaInteres">Tasa de Interés (%):</label>
            <input type="text" id="txtTasaInteres" placeholder="Tasa anual">

            <div class="result-box">
                <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
                <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
                <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
            </div>

            <div class="status-zone">
                <p>Estado: <span id="spnEstadoCredito">ESPERANDO DATOS...</span></p>
            </div>

            <div class="buttons">
                <button id="btnCalcularCredito">CALCULAR CRÉDITO</button>
                <button id="btnReiniciar">REINICIAR</button>
            </div>
        </div>
    </div>

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>

</body>
</html>
